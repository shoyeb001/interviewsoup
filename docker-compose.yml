version: '3.9'

services:

  backend:
    build:
      context: ./apps/backend
    container_name: interview_backend
    ports:
      - "5000:5000"
    volumes:
      - ./apps/backend:/app
      - /app/node_modules
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - DB_Host=${DB_Host}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - REDIS_URL=${REDIS_URL}
      - JWT_SECRET=${JWT_SECRET}
      - MAIL_USER=${MAIL_USER}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
    env_file:
      - .env
    develop:
      watch:
        - action: sync
          path: ./app/backend
          target: /app
          ignore:
            - dist
        - action: rebuild
          path: ./app/backend
          target: /app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # frontend:
  #   build:
  #     context: ./apps/frontend
  #   container_name: interview_frontend
  #   ports:
  #     - "5173:5173"
  #   volumes:
  #     - ./apps/frontend:/app
  #     - /app/node_modules

  postgres:
    image: postgres:16
    container_name: interview_postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: interview_platform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: interview_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data: